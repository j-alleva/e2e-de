version: 2

models:
  - name: mart_daily_weather_summary
    description: "Daily weather aggregation by location, built for business reporting."
    columns:
      - name: summary_id
        description: "Primary key for the daily summary."
        tests:
          - unique
          - not_null
          
      - name: date_id
        description: "Surrogate foreign key to stg_date."
        tests:
          - not_null
          - relationships:
              to: ref('stg_date')
              field: date_id
              
      - name: location_id
        description: "Surrogate foreign key to stg_location."
        tests:
          - not_null
          - relationships:
              to: ref('stg_location')
              field: location_id